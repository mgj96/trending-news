name: GitHub Trending AI Report

# 이 워크플로우는 "언제 돌릴지"(트리거)만 담당하고,
# 실제 실행 로직은 _python-report.yml(재사용 워크플로우)에 위임한다.
on:
  schedule:
    - cron: '13 22 * * *' # 매일 한국시간 오전 7시 13분에 실행 (서버 지연 방지)
  workflow_dispatch: # 수동으로 즉시 실행해 볼 수 있는 버튼 활성화

# caller가 부여하는 권한이 called 워크플로우 권한의 상한이 된다.
permissions:
  contents: write

jobs:
  daily-trending:
    # 같은 레포의 재사용 워크플로우를 상대경로로 호출
    uses: ./.github/workflows/_python-report.yml
    with:
      python-version: '3.10'
      script-name: 'trending.py'
      commit-message: '🚀 Update daily trending report'
    # secrets를 명시적으로 전달 (어떤 시크릿이 흘러가는지 한눈에 보임).
    # 전부 그대로 넘길 때는 `secrets: inherit` 한 줄로 대체 가능.
    secrets:
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      EMAIL_USER: ${{ secrets.EMAIL_USER }}
      EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
