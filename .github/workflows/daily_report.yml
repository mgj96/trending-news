name: Daily GitHub Trending Report
on:
  schedule:
    - cron: '13 22 * * *' #트래픽 지연 방지 위해 22:13 UTC (한국 시간 7:13 PM)로 설정
  workflow_dispatch:    # 수동 실행 버튼

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4 # 최신 버전 사용

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      - name: Run script
        env:
          EMAIL_USER: ${{ secrets.EMAIL_USER }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
        run: python trending.py

      - name: Commit and Push
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add .
          git commit -m "Add daily trending report $(date +'%Y-%m-%d')" || echo "No changes to commit"
          
          # 핵심: Push 하기 전에 원격 저장소의 최신 상태를 병합(Rebase)합니다.
          git pull --rebase origin main
          
          git push origin main