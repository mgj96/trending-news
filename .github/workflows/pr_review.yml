name: PR AI Review

# 언제 도나: PR이 열리거나(opened), 새 커밋이 푸시되거나(synchronize),
#           닫힌 PR이 다시 열릴 때(reopened). PR 1건당 위 이벤트마다 1회 리뷰.
on:
  pull_request:
    types: [opened, synchronize, reopened]

# 권한은 최소로:
#   - contents: read       → 코드 읽기
#   - pull-requests: write → PR에 리뷰 코멘트 달기
# 그 외 권한은 주지 않는다 (최소 권한 원칙).
permissions:
  contents: read
  pull-requests: write

jobs:
  ai-review:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # base와 비교하려면 전체 히스토리 필요

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install google-generativeai

      - name: Extract diff
        # base 브랜치와 PR의 차이만 추출 (3-dot: 공통조상 기준)
        run: git diff origin/${{ github.base_ref }}...HEAD > pr.diff

      - name: Run AI review
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python scripts/pr_review.py

      - name: Post review comment
        env:
          GH_TOKEN: ${{ github.token }} # 깃허브가 자동 발급하는 임시 토큰
        run: |
          gh pr comment ${{ github.event.pull_request.number }} \
            --body-file review.md \
            -R ${{ github.repository }}
